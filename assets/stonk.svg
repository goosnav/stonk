<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15181d"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00d964" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00d964" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- squircle plate -->
  <path d="M224 40 h576 c101 0 184 83 184 184 v576 c0 101 -83 184 -184 184 h-576 c-101 0 -184 -83 -184 -184 v-576 c0 -101 83 -184 184 -184 z" fill="url(#bg)" stroke="#2a2d33" stroke-width="6"/>
  <!-- faint grid -->
  <g stroke="#20242b" stroke-width="3">
    <line x1="120" y1="300" x2="904" y2="300"/>
    <line x1="120" y1="470" x2="904" y2="470"/>
    <line x1="120" y1="640" x2="904" y2="640"/>
    <line x1="120" y1="810" x2="904" y2="810"/>
  </g>
  <!-- candlesticks (amber, receding) -->
  <g stroke="#ff7a1a" stroke-width="7" fill="#ff7a1a" opacity="0.85">
    <line x1="250" y1="640" x2="250" y2="770"/><rect x="230" y="672" width="40" height="70"/>
    <line x1="380" y1="560" x2="380" y2="700"/><rect x="360" y="596" width="40" height="78"/>
  </g>
  <!-- rising area + line to an up-arrow -->
  <path d="M120 760 L300 700 L440 610 L600 470 L760 360 L830 300 L830 860 L120 860 Z" fill="url(#area)"/>
  <polyline points="120,760 300,700 440,610 600,470 760,360 838,292" fill="none"
    stroke="#00d964" stroke-width="26" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>
  <!-- arrowhead -->
  <path d="M838 292 l-96 22 l70 66 z" fill="#00d964" filter="url(#glow)"/>
  <!-- dollar tick -->
  <text x="150" y="250" font-family="Menlo,monospace" font-size="120" font-weight="700" fill="#e6e6e3">$</text>
</svg>
