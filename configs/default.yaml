# Stonk Terminal default configuration. paper.yaml / live.yaml overlay this.
# Everything here is editable from the GUI (changes are audit-logged);
# the risk governor rejects dangerous values unless a scoped, expiring
# risk_exceptions entry covers them (hard invariants are never exceptable).

mode: paper                # paper | live
broker: paper              # paper | robinhood_mcp | robinhood_bridge
live_trading_enabled: false   # must ALSO set env LIVE_TRADING_ENABLED=true
# Scoped risk exceptions (see configs/live.yaml for the shape). Empty here:
# paper/default must run inside standard limits.
risk_exceptions: []

db_path: data/specforge.db

schedule:
  timezone: America/New_York
  scans: ["09:45", "12:30", "15:30"]
  post_close: "16:30"        # attribution + weight updates
  weekend_research: "SAT 10:00"

universe:
  symbols: [SPY, QQQ, IWM, DIA,
            XLK, XLF, XLE, XLV, XLY, XLP, XLI, XLU, XLB, XLRE, XLC,
            AAPL, MSFT, NVDA, AMZN, GOOGL, META, TSLA, AMD, AVGO, NFLX,
            JPM, V, UNH, LLY, XOM, CVX, WMT, COST, ORCL, CRM,
            QCOM, TXN, CAT, BA, GE, KO, PEP, MCD, DIS, MU]
  benchmark: SPY
  vix_symbol: ^VIX
  volatility_symbols:
    vix9d: ^VIX9D
    vix: ^VIX
    vix3m: ^VIX3M
    vix6m: ^VIX6M
    vvix: ^VVIX
  context_symbols: [HYG, TLT]
  sector_etfs: [XLK, XLF, XLE, XLV, XLY, XLP, XLI, XLU, XLB, XLRE, XLC]
  min_price: 5.0
  min_dollar_volume: 50000000
  max_spread_pct: 0.005      # assumed spread cap for liquid-universe cost model
  research_size: 1500
  active_size: 250
  execution_shortlist_size: 25
  research_min_dollar_volume: 10000000
  execution_min_dollar_volume: 50000000
  min_history_bars: 260

risk:
  # --- The primary safety check: per-scan-cycle deployment budget.
  # Worst-case loss of all NEW positions opened in one cycle (full notional for
  # equities, full premium for options) must fit inside this budget.
  time_step_budget_pct: 0.10       # fraction of account equity per scan cycle
  time_step_budget_abs_cap: 5000   # hard $ ceiling regardless of equity

  max_account_deployment: 0.70
  min_cash_reserve: 0.30
  max_single_equity_position: 0.08
  max_sector_exposure: 0.25
  max_open_positions: 12
  max_daily_new_positions: 3
  max_rebalance_turnover_per_cycle: 0.30
  max_rebalance_sells_per_cycle: 2
  max_daily_loss: 0.02
  max_weekly_loss: 0.05
  kill_switch_drawdown: 0.15
  drawdown_cooldown_days: 10       # auto-resume after N days; null = manual reset only
  max_rejected_orders_per_day: 5
  rejected_order_cooldown_minutes: 30  # retry after transient broker incident
  stale_data_max_age_days: 4       # refuse to trade on bars older than this
  duplicate_order_cooldown_min: 60 # same symbol+side within window = duplicate

  # Approval policy — CONFIRM-TRADE FEATURE. Default is fully autonomous: the
  # engine places every risk-approved order itself (bounded by the time-step
  # budget + all caps + kill switches below). Change to gate trades:
  #   auto      → trade freely, no human confirmation (DEFAULT)
  #   threshold → only orders above approval_notional_threshold_pct wait for you
  #   all       → every order waits for your approve click in the GUI
  # Editable live from the GUI (Risk & Budget tab) or here.
  approval_mode: auto              # auto | threshold | all
  approval_notional_threshold_pct: 0.10   # only used when approval_mode=threshold
  approval_timeout_hours: 24       # queued (un-auto) intents expire after this

  # Options (node auto-unlocks by account scale)
  options_enabled: auto            # auto | true | false
  min_viable_option_premium: 75    # $; unlock when equity*max_single_option_premium_risk >= this
  max_single_option_premium_risk: 0.015
  max_total_options_premium_risk: 0.06
  option_min_dte: 21
  option_max_dte: 120
  option_min_delta: 0.25
  option_max_delta: 0.70
  option_max_spread_pct: 0.15
  option_min_open_interest: 100

execution:
  order_type: limit                # limit | market (market requires a risk_exceptions entry)
  limit_offset_pct: 0.001          # limit at last price +/- offset (cross the spread a hair)
  spread_cost_bps: 3               # cost model: half-spread for liquid names
  slippage_bps: 5
  # Explicit opt-in only. Suitability/account-eligibility warnings are not
  # acknowledgements: they block until the broker says the account is ready.
  acknowledged_broker_alerts: []

regime:
  vix_risk_on_max: 20
  vix_stress_min: 28
  breadth_risk_on_min: 0.55        # fraction of universe above 50d SMA
  breadth_risk_off_max: 0.35
  # deployment multiplier by regime (scales time-step budget)
  deployment_multiplier:
    risk_on: 1.0
    neutral: 0.6
    risk_off: 0.25
    stress: 0.0

data_sources:
  # quote provider chain, first hit wins per symbol (specforge/quotes.py)
  quotes: [broker, stooq, yfinance]

nodes:
  # weight = base ensemble weight; regime multipliers & learned adjustments apply on top.
  # status: experimental | probation | production | disabled
  momentum:        {enabled: true,  weight: 0.30, status: production,  horizon_days: 20}
  sector_rotation: {enabled: true,  weight: 0.20, status: production,  horizon_days: 20}
  # Automated learning may deemphasize these analyses to their configured
  # floor. Only a human action in the toggle panel may turn one off entirely.
  reversal:        {enabled: true,  weight: 0.10, status: experimental, horizon_days: 5}
  earnings_drift:  {enabled: true,  weight: 0.25, status: probation,   horizon_days: 20}
  quality_value:   {enabled: true,  role: filter, status: production}
  news_sentiment:  {enabled: false, weight: 0.05, status: experimental, horizon_days: 5, ai: true, max_symbols_per_cycle: 12}
  congress_trades: {enabled: true,  weight: 0.05, status: experimental, horizon_days: 60}
  insider:         {enabled: true,  weight: 0.05, status: experimental, horizon_days: 40}
  options_vol:     {enabled: false, weight: 0.05, status: experimental, horizon_days: 30}
  # deterministic reader of the ACTIVE short-term hypothesis (V4/D34); the AI
  # generation step is separate + post-close. Needs hypothesis.enabled too.
  hypothesis:      {enabled: false, weight: 0.40, status: experimental, horizon_days: 10}
  # D37: LLM valuation read of company-published financials (yfinance),
  # kv-cached 3 days/symbol so scans don't re-spend tokens. Long-only system:
  # a sell/short view lands as direction=avoid (suppresses the long case).
  fundamentals:    {enabled: false, weight: 0.15, status: retired, horizon_days: 40, ai: true, refresh_days: 3, max_refreshes_per_cycle: 4}
  # Production evidence nodes consume versioned, citation-checked dossiers
  # generated by Deep Research. They vote; they never size or place orders.
  business_fundamentals: {enabled: true, weight: 0.30, status: production, horizon_days: 60, ai: true}
  company_catalyst:      {enabled: true, weight: 0.20, status: production, horizon_days: 14, ai: true}
  # D40 additions — all experimental, all earn weight through measured trades:
  # gap: live-quote opening-gap continuation (silent in backtests by design)
  gap:             {enabled: true, weight: 0.10, status: experimental, horizon_days: 5}
  # vol_contraction: VCP-lite breakout, daily bars only, fully backtestable
  vol_contraction: {enabled: true, weight: 0.15, status: experimental, horizon_days: 20}
  # neural: causal multivariate TCN; silent until all validation/shadow gates
  # pass — an unproven model gets no vote
  neural:          {enabled: true, weight: 0.15, status: experimental, horizon_days: 21}

ensemble:
  min_final_score: 0.15            # below this: no trade (saying "no" is a feature)
  conflict_dispersion_penalty: 0.5 # score dispersion across nodes shrinks conviction
  weight_learning:                 # self-improvement bounds (governor enforces)
    enabled: true
    min_multiplier: 0.25           # compatibility alias; per-status floors win
    production_floor: 0.50         # automation never zeros an enabled analysis
    experimental_floor: 0.25
    max_multiplier: 1.50
    min_trades_before_update: 50
    shrinkage: 0.7                 # Bayesian shrink toward zero edge
    regime_min_n: 30               # trades per (node, regime) cell before a regime multiplier applies

# Fixed family budgets prevent a missing AI read from donating its weight to
# momentum. Learned multipliers operate only inside each family.
evidence:
  company_families: {business: 0.30, catalyst: 0.20, quality: 0.15, context: 0.15, price: 0.20}
  etf_families: {context: 0.50, price: 0.50}
  node_priors:
    business: {business_fundamentals: 1.0}
    catalyst: {company_catalyst: 0.50, earnings_drift: 0.25, news_sentiment: 0.10, insider: 0.075, congress_trades: 0.075}
    quality: {quality_value: 1.0}
    context: {sector_rotation: 0.45, macro_regime: 0.45, hypothesis: 0.10}
    price: {momentum: 0.40, reversal: 0.20, gap: 0.15, vol_contraction: 0.25}
  dossierless_probe_min_score: 0.25
  quality_node_weight: 1.0

# Learned connections between the auditable specialist equations. The graph
# remains a zero-influence shadow until a validated champion is promoted.
analog_graph:
  enabled: true
  live_blend: 0.50               # automatic ramp uses 10% → 25% → this ceiling
  max_topology_trials_per_snapshot: 24
  # Soft-prune redundant connections only. An enabled specialist always keeps
  # a nonzero path; only the human node toggle can eliminate an analysis type.
  prune_contribution_pct: 0.01
  shadow_sessions: 30

sizing:
  vol_target_pct: 0.01             # per-position daily vol target (fraction of equity)
  atr_stop_multiple: 1.8
  time_stop_days_default: 20
  rebalance_score_hysteresis: 0.05

# V4/D28 hypothesis layer. Master switch; generation additionally requires
# ai.enabled (the node degrades to silence with no active hypothesis).
hypothesis:
  enabled: false
  short_term_max_age_days: 5      # regen when the active one is older
  regen_on_regime_change: true
  north_star_review_days: 30
  max_watchlist: 8                # symbols the hypothesis may add to the scan
  steering_ttl_hours: 24          # steering request lifetime before expiry default

# D40 neural training loop. Trains ONLY while the market is closed (bounded
# 30-min-interval bursts), checkpoints atomically every burst, and the node
# refuses to trade until validation IC (embargoed holdout) clears min_val_ic.
neural:
  enabled: true
  # Direct bounded blend of the champion TCN into candidate scoring (Stage C1).
  # Graph-independent; 0 with deterministic fallback when no valid champion.
  # A value below min_blend means OFF; values above max_blend are clamped down.
  experimental_blend: 0.15
  min_blend: 0.05
  max_blend: 0.40
  # Bounded neural-disagreement probe (Stage C2): at most one quarter-sized
  # exploration position beyond the deterministic batch. Still passes the
  # governor, cash/deployment caps, and duplicate checks like any order.
  exploration:
    enabled: true
    max_open_positions: 1
    budget_fraction: 0.20          # cap: fraction of equity a probe may use
    size_multiplier: 0.25          # quarter of the normal calculated position
    min_absolute_edge: 0.0075      # abs q50 − round-trip cost must clear this
    min_probability: 0.57          # P(absolute return > cost)
    max_uncertainty: 0.15          # abs q90 − q10 cap
  device: auto                     # CUDA, then Apple MPS, then bounded CPU
  checkpoint: data/models/global_tcn.pt
  holdings_dir: data/models/holdings
  input_sessions: 60
  horizons: [5, 21]
  quantiles: [0.1, 0.5, 0.9]
  max_epochs: 50
  patience: 5
  max_trials_per_snapshot: 6
  max_windows_per_symbol: 500
  # Process-safety ceiling also enforced in code. 12k multivariate windows are
  # sampled evenly across symbols/history; larger research uses more snapshots,
  # not a multi-gigabyte in-memory tensor inside the operator service.
  max_training_windows: 12000
  min_fundamental_coverage: 0.80
  walk_forward_folds: 5
  holding_min_bars: 1250
  holding_blend: 0.25
  max_checkpoint_age_days: 7
  train_since: "2011-01-01"        # regime relevance + VIX availability

research:
  interval_minutes: 15
  max_task_seconds: 600
  weekend_task_seconds: 1800
  max_cpu_threads: 4
  backfill_batch_size: 50
  min_training_universe: 500
  forecast_horizons: [5, 21]

# One-shot, structured intelligence. Codex/GPT is the default local path,
# Claude is the local fallback, and paid API access is last. All fields can be
# overridden live from Config without restarting the scheduler.
intelligence:
  enabled: true
  default_provider: codex
  default_models:
    cheap: gpt-5.4-mini
    advanced: gpt-5.5             # installed Codex catalog; 5.6 requires an explicit variant
  local_fallback:
    provider: claude
    models: {cheap: haiku, advanced: opus}
  api_fallback:
    enabled: true
    provider: openrouter
    base_url: https://openrouter.ai/api/v1
    models:
      cheap: deepseek/deepseek-chat-v3-0324
      advanced: anthropic/claude-sonnet-4.5
  purpose_tiers:
    headline_classification: cheap
    investment_memo: advanced
    hypothesis: advanced
    strategic_synthesis: advanced
  purpose_routes: {}
  daily_local_limits: {cheap: 24, advanced: 4}
  request_timeout_seconds: 120
  cache_ttl_hours: 24

strategy:
  enabled: true
  max_score_contribution: 0.15
  min_underlying_score: 0.10
  min_evidence_coverage: 0.50
  default_expiry_days: 30
  trim_hysteresis_cycles: 2

ai:
  enabled: false
  base_url: https://openrouter.ai/api/v1
  model: deepseek/deepseek-chat-v3-0324   # default when a purpose has no route
  # D36 per-purpose routing: bulk classification stays CHEAP; the strategy
  # layer gets a flagship reasoner. Any OpenRouter id works (x-ai/grok-4 too —
  # closer to the X firehose if you want that angle on news or hypothesis).
  models:
    headline_classification: deepseek/deepseek-chat-v3-0324
    hypothesis: anthropic/claude-sonnet-4.5
    investment_memo: anthropic/claude-sonnet-4.5
  reasoning_effort:                # passthrough; reasoning models think,
    hypothesis: medium             # the rest silently ignore it
  daily_budget_usd: 1.00
  monthly_budget_usd: 40.00        # user-selected hard ceiling; GUI editable
  purpose_monthly_caps:
    hypothesis: 20.00              # flagship strategy calls capped separately
  # price table per 1M tokens, editable; used by the reserve-then-commit ledger
  prices:
    deepseek/deepseek-chat-v3-0324: {input: 0.25, output: 0.85}
    qwen/qwen-2.5-72b-instruct:     {input: 0.35, output: 0.40}
    anthropic/claude-haiku-4.5:     {input: 1.00, output: 5.00}
    anthropic/claude-sonnet-4.5:    {input: 3.00, output: 15.00}
    x-ai/grok-4:                    {input: 3.00, output: 15.00}
  cache_ttl_hours: 24
  request_timeout_seconds: 20      # AI failure degrades a node, never stalls a cycle
  est_tokens_per_headline: 220     # pre-flight cost estimate basis
